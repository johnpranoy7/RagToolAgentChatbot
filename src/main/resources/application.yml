spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/vfu_chatbot}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jackson:
    date-format: "MM/dd/yyyy"
    deserialization:
      fail-on-unknown-properties: false

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.1
          max-tokens: 300
      embedding:
        options:
          model: text-embedding-3-small   # 1536 dimensions
    vectorstore:
      pgvector:
        initialize-schema: true           # auto-create vector table
        distance-type: COSINE_DISTANCE
        dimensions: 1536

management:
  endpoints:
    web:
      exposure:
        include: health, ratelimiters, ratelimiterevents, metrics  # Expose endpoints
  endpoint:
    health:
      show-details: always
  health:
    ratelimiters:
      enabled: true

resilience4j.ratelimiter:
  instances:
    rateLimitingApi:
      limit-for-period: 30        # 30 requests
      limit-refresh-period: 1m    # per minute
      timeout-duration: 500ms     # wait max 500ms
      register-health-indicator: true
      event-consumer-buffer-size: 100
  metrics:
    enabled: true


app:
  jina:
    api-key: ${JINA_API_KEY:dummy}
  vfu:
    customer-service-phone: ${CUSTOMER_SUPPORT_PHONE}
    customer-service-email: ${CUSTOMER_SUPPORT_EMAIL}

streamx:
  endpoint:
    baseurl: ${STREAMX_URL}
    tokenKey: ${STREAMX_KEY}
    tokenSecret: ${STREAMX_SECRET}