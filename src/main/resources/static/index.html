<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#154e6b">
    <title>Vacations for YOU — Support</title>
    <link rel="icon" type="image/png" href="images/vacations-for-you-icon-background-e1705507231850-300x109.png">
    <link rel="apple-touch-icon" href="images/vacations-for-you-icon-background-e1705507231850-300x109.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Vacations for YOU — Astra theme palette (from site inspect) */
            --ast-global-color-0: #e77840;
            --ast-global-color-1: #c06436;
            --ast-global-color-2: #154e6b;
            --ast-global-color-3: #52505e;
            --ast-global-color-4: #f7f6fe;
            --ast-global-color-5: #FFFFFF;
            --ast-global-color-6: rgba(255, 255, 255, 0.8);
            --ast-global-color-7: #888698;
            --ast-global-color-8: #f7f6fe;

            --ocean: var(--ast-global-color-2);
            --ocean-deep: #0e3a50;
            --ocean-light: #2a6d8f;
            --ocean-pale: #ebe9f5;
            --accent: var(--ast-global-color-0);
            --accent-deep: var(--ast-global-color-1);
            --accent-soft: #fdeee8;
            --rgb-ocean: 21, 78, 107;
            --rgb-accent: 231, 120, 64;
            --sand: var(--ast-global-color-8);
            --sand-warm: #fdf0eb;
            --coral: var(--accent);
            --white: var(--ast-global-color-5);
            --ink: var(--ast-global-color-3);
            --ink-muted: var(--ast-global-color-3);
            --ink-faint: var(--ast-global-color-7);
            --surface: var(--ast-global-color-4);
            --border: #e0deea;
            --shadow: 0 4px 24px rgba(var(--rgb-ocean), 0.1);
            --shadow-lg: 0 12px 48px rgba(var(--rgb-ocean), 0.14);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-msg: 18px;
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--surface);
            color: var(--ink);
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(var(--rgb-ocean), 0.07) 0%, transparent 70%),
            radial-gradient(ellipse 60% 40% at 100% 100%, rgba(var(--rgb-accent), 0.08) 0%, transparent 60%),
            var(--surface);
        }

        .page-wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-card {
            width: 100%;
            max-width: 560px;
            height: min(820px, calc(100vh - 40px));
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
        }

        .chat-header {
            background: linear-gradient(135deg, var(--ocean) 0%, var(--ocean-deep) 100%);
            padding: 20px 24px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .chat-header::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
        }

        .chat-header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 30%;
            width: 60px;
            height: 60px;
            background: rgba(var(--rgb-accent), 0.12);
            border-radius: 50%;
        }

        .header-brand {
            flex-shrink: 0;
            z-index: 1;
            display: flex;
            align-items: center;
            max-width: min(280px, 62%);
        }

        .header-logo {
            height: 46px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }

        .header-info {
            flex: 1;
            z-index: 1;
            min-width: 0;
        }

        .header-status {
            font-size: 12px;
            color: var(--ast-global-color-6);
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #4ADE80;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(0.85);
            }
        }

        .header-actions {
            z-index: 1;
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.85);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 11px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .welcome-banner {
            background: linear-gradient(135deg, var(--ocean-pale) 0%, var(--accent-soft) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            margin-bottom: 12px;
            text-align: center;
        }

        .welcome-banner-emoji {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .welcome-banner h3 {
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--ast-global-color-2);
            margin-bottom: 6px;
        }

        .welcome-banner p {
            font-size: 12.5px;
            color: var(--ink-muted);
            line-height: 1.55;
        }

        .welcome-banner p strong {
            color: var(--ocean);
            font-weight: 600;
        }

        .msg-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        .msg-group.user {
            align-items: flex-end;
        }

        .msg-group.bot {
            align-items: flex-start;
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 88%;
        }

        .msg-group.user .msg-row {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .msg-group.bot .msg-avatar {
            background: linear-gradient(135deg, var(--ocean) 0%, var(--ocean-deep) 100%);
        }

        .msg-group.user .msg-avatar {
            background: var(--sand-warm);
        }

        .msg-bubble {
            padding: 11px 15px;
            border-radius: var(--radius-msg);
            font-size: 13.5px;
            line-height: 1.58;
            word-wrap: break-word;
            white-space: pre-wrap;
            max-width: 100%;
        }

        .msg-group.bot .msg-bubble {
            background: var(--accent-soft);
            color: var(--ink);
            border: 1px solid rgba(var(--rgb-accent), 0.2);
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 10px rgba(var(--rgb-accent), 0.07);
        }

        .msg-group.user .msg-bubble {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
            color: #fff;
            border-bottom-right-radius: 5px;
        }

        .msg-meta {
            font-size: 10.5px;
            color: var(--ink-faint);
            margin-top: 4px;
            padding: 0 4px;
        }

        .msg-group.user .msg-meta {
            text-align: right;
        }

        .intent-tag {
            display: inline-block;
            background: var(--accent-soft);
            color: var(--accent-deep);
            font-size: 10px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 20px;
            margin-left: 6px;
            font-family: 'Sora', sans-serif;
            letter-spacing: 0.02em;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }

        .typing-bubble {
            background: var(--accent-soft);
            border: 1px solid rgba(var(--rgb-accent), 0.2);
            border-radius: var(--radius-msg);
            border-bottom-left-radius: 5px;
            padding: 12px 16px;
            display: flex;
            gap: 4px;
            align-items: center;
            box-shadow: 0 2px 10px rgba(var(--rgb-accent), 0.06);
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--ink-faint);
            border-radius: 50%;
            animation: typing-bounce 1.3s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.18s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.36s;
        }

        @keyframes typing-bounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        .quick-replies {
            flex-shrink: 0;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .quick-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            font: inherit;
            text-align: left;
            color: var(--ink-muted);
            transition: background 0.15s;
        }

        .quick-toggle:hover {
            background: rgba(var(--rgb-ocean), 0.06);
        }

        .quick-toggle-label {
            font-size: 10.5px;
            font-weight: 600;
            color: var(--ink-faint);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-family: 'Sora', sans-serif;
        }

        .quick-chevron {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            color: var(--ink-faint);
            transition: transform 0.2s ease;
        }

        .quick-replies:not(.collapsed) .quick-chevron {
            transform: rotate(180deg);
        }

        .quick-replies-panel {
            display: grid;
            grid-template-rows: 1fr;
        }

        .quick-replies.collapsed .quick-replies-panel {
            grid-template-rows: 0fr;
        }

        .quick-replies-panel-inner {
            overflow: hidden;
            min-height: 0;
        }

        .quick-replies-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            padding: 0 18px 10px;
        }

        .quick-btn {
            background: var(--white);
            border: 1.5px solid var(--border);
            color: var(--ocean);
            font-size: 12px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.18s;
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent-deep);
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(var(--rgb-accent), 0.28);
        }

        .quick-btn:active {
            transform: translateY(0);
        }

        .input-area {
            padding: 14px 18px 16px;
            background: var(--white);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .input-field {
            flex: 1;
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 11px 18px;
            font-size: 13.5px;
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
            background: var(--surface);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            resize: none;
        }

        .input-field::placeholder {
            color: var(--ink-faint);
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(var(--rgb-accent), 0.18);
            background: var(--white);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
            border: none;
            color: #fff;
            font-size: 17px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.18s, box-shadow 0.18s;
            box-shadow: 0 3px 12px rgba(var(--rgb-accent), 0.35);
        }

        .send-btn svg {
            display: block;
            margin-left: 1px;
        }

        .send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 5px 18px rgba(var(--rgb-accent), 0.45);
        }

        .send-btn:active {
            transform: scale(0.96);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .chat-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            font-size: 10.5px;
            color: var(--ink-faint);
            padding: 10px 14px 12px;
            background: var(--white);
            flex-shrink: 0;
            border-top: 1px solid var(--border);
        }

        .footer-brand-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--ink-muted);
            gap: 8px;
            flex-wrap: wrap;
            transition: color 0.15s;
        }

        .footer-brand-link:hover {
            color: var(--accent-deep);
        }

        .footer-logo {
            height: 42px;
            width: auto;
            max-width: min(300px, 85vw);
            object-fit: contain;
            display: block;
        }

        .footer-brand-text {
            font-size: 11px;
            font-weight: 500;
        }

        .msg-in {
            animation: msg-appear 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes msg-appear {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 520px) {
            .page-wrapper {
                padding: 0;
            }

            .chat-card {
                max-width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
            }

            .header-logo {
                height: 38px;
            }

            .footer-logo {
                height: 36px;
            }
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <div class="chat-card">

        <div class="chat-header">
            <div class="header-brand">
                <img class="header-logo" src="images/VFY-LOGO-FULL-WHITE-120x80.webp"
                     width="120" height="80" alt="Vacations for YOU" loading="eager" decoding="async">
            </div>
            <div class="header-info">
                <div class="header-status">
                    <span class="status-dot"></span>
                    AI Support · Available 24/7
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-reset" onclick="resetChat()">New Chat</button>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="welcome-banner">
                <div class="welcome-banner-emoji">👋</div>
                <h3>Welcome to Vacations for YOU!</h3>
                <p>Ask about <strong>policies</strong>, <strong>check-in times</strong>, or
                    <strong>cancellations</strong>.<br>Share your <strong>Reservation ID</strong> for booking-specific
                    help.</p>
            </div>
        </div>

        <div class="quick-replies collapsed" id="quickReplies">
            <button type="button" class="quick-toggle" id="quickToggle" onclick="toggleQuickReplies()"
                    aria-expanded="false" aria-controls="quickRepliesPanel"
                    title="Show or hide suggested prompts">
                <span class="quick-toggle-label">Suggested prompts</span>
                <svg class="quick-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
            <div class="quick-replies-panel" id="quickRepliesPanel">
                <div class="quick-replies-panel-inner">
                    <div class="quick-replies-chips">
                        <button type="button" class="quick-btn" onclick="sendQuick('What is your cancellation policy?')">Cancellation Policy</button>
                        <button type="button" class="quick-btn" onclick="sendQuick('What time is check-in?')">Check-in Time</button>
                        <button type="button" class="quick-btn" onclick="sendQuick('Are pets allowed?')">Pet Policy</button>
                        <button type="button" class="quick-btn" onclick="sendQuick('I want to check my reservation')">My Reservation</button>
                        <button type="button" class="quick-btn" onclick="sendQuick('How does payment work?')">Payment Info</button>
                        <button type="button" class="quick-btn" onclick="sendQuick('I want to speak to a human agent')">Talk to Agent</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input
                    class="input-field"
                    id="inputField"
                    type="text"
                    placeholder="Type a message or your Reservation ID…"
                    onkeydown="handleKey(event)"
                    autocomplete="off"
            />
            <button class="send-btn" id="sendBtn" type="button" onclick="sendMessage()" aria-label="Send message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M5 12h14"/>
                    <path d="M12 5l7 7-7 7"/>
                </svg>
            </button>
        </div>

        <div class="chat-footer">
            <a class="footer-brand-link" href="https://vacationsforyou.com/" target="_blank" rel="noopener noreferrer"
               title="Vacations for YOU — cabin &amp; beach rentals">
                <img class="footer-logo" src="images/VFY-LOGO-FULL-COLOR-300x200.webp"
                     width="300" height="200" alt="Vacations for YOU" loading="lazy" decoding="async">
                <span class="footer-brand-text">vacationsforyou.com</span>
            </a>
        </div>

    </div>
</div>
<script>
    const messagesArea = document.getElementById('messagesArea');
    const TRANSCRIPT_KEY = 'vacationsChatTranscript';

    function normalizeSessionId(raw) {
        if (raw == null || raw === '' || String(raw).toLowerCase() === 'unknown') return null;
        const s = String(raw).replace(/unknown/gi, '').trim();
        return s || null;
    }

    let SESSION_ID = normalizeSessionId(localStorage.getItem('chatSessionId'));
    let transcript = [];

    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');

    // CSRF Token (Spring Security)
    const CSRF_TOKEN = document.querySelector('meta[name="_csrf"]')?.content ||
        localStorage.getItem('csrfToken');

    function getTime() {
        return new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    }

    // MARKDOWN RENDERING (Your backend format)
    function renderMarkdown(text) {
        return text
            .replace(/\*\*(.*?)\*\*/g, '<strong style="color:#154e6b;font-weight:600">$1</strong>')
            .replace(/`([^`]+)`/g, '<code style="background:#f0f3f5;padding:2px 6px;border-radius:4px">$1</code>')
            .replace(/\\n/g, '<br>')
            .replace(/\\n\\n/g, '<br><br>');
    }

    function saveTranscript() {
        try {
            localStorage.setItem(TRANSCRIPT_KEY, JSON.stringify(transcript));
        } catch (e) {
            console.warn('Could not save chat transcript', e);
        }
    }

    function hideWelcomeBannerIfNeeded() {
        const w = messagesArea.querySelector('.welcome-banner');
        if (w) w.remove();
    }

    function appendMessage(role, text, intentInfo, skipPersist) {
        hideWelcomeBannerIfNeeded();
        if (!skipPersist) {
            transcript.push({
                role,
                text,
                intent: intentInfo && intentInfo.intent != null ? intentInfo.intent : null,
                confidence: intentInfo && intentInfo.confidence != null ? intentInfo.confidence : null
            });
            saveTranscript();
        }

        const group = document.createElement('div');
        group.className = `msg-group ${role} msg-in`;

        const row = document.createElement('div');
        row.className = 'msg-row';

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = role === 'bot' ? '🤖' : '👤';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.innerHTML = renderMarkdown(text);  // ✅ Markdown → HTML

        row.appendChild(avatar);
        row.appendChild(bubble);
        group.appendChild(row);

        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        const intentLabel = intentInfo && intentInfo.intent != null ? intentInfo.intent : 'general';
        const conf = intentInfo && intentInfo.confidence != null ? intentInfo.confidence : 0;
        meta.innerHTML = `${getTime()}${intentInfo ? `<span class="intent-tag">${intentLabel} · ${Math.round(conf * 100)}%</span>` : ''}`;

        group.appendChild(meta);
        messagesArea.appendChild(group);
        scrollToBottom();
    }

    async function sendMessage() {
        const text = inputField.value.trim();
        if (!text) return;

        inputField.value = '';
        appendMessage('user', text, null);
        setLoading(true);
        showTyping();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': CSRF_TOKEN  // Security
                },
                body: JSON.stringify({
                    message: text,
                    sessionId: SESSION_ID?.replace('unknown', '') || ''
                }),
            });

            // Get new sessionId from header if needed
            SESSION_ID = normalizeSessionId(response.headers.get('X-Session-ID') || SESSION_ID);
            if (SESSION_ID) localStorage.setItem('chatSessionId', SESSION_ID);

            const data = await response.json();
            hideTyping();

            // Map your backend response format
            appendMessage('bot', data.content || data.response, {
                intent: data.source || 'general',
                confidence: data.confidence || 0.0
            });
        } catch (err) {
            hideTyping();
            appendMessage('bot', 'Sorry, something went wrong. Please refresh or call 1-800-VACATION.', null);
        } finally {
            setLoading(false);
            inputField.focus();
        }
    }

    // Rest of your functions unchanged (showTyping, scrollToBottom, etc.)
    function showTyping() {
        const el = document.createElement('div');
        el.className = 'msg-group bot msg-in';
        el.id = 'typingIndicator';

        const row = document.createElement('div');
        row.className = 'typing-indicator';

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = '🤖';

        const bubble = document.createElement('div');
        bubble.className = 'typing-bubble';
        bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

        row.appendChild(avatar);
        row.appendChild(bubble);
        el.appendChild(row);
        messagesArea.appendChild(el);
        scrollToBottom();
    }

    function hideTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function scrollToBottom() {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function setLoading(val) {
        sendBtn.disabled = val;
        inputField.disabled = val;
    }

    /** Pixels from the bottom of the scrollable message list (stable across quick-panel open/close). */
    function messagesDistFromBottomPx() {
        const el = messagesArea;
        return Math.max(0, el.scrollHeight - el.clientHeight - el.scrollTop);
    }

    /** After toggling the quick-replies panel, restore the same distance-from-bottom (requires layout flush first). */
    function preserveMessagesScrollFromBottom(distFromBottom) {
        const el = messagesArea;
        const max = el.scrollHeight - el.clientHeight;
        const target = max - distFromBottom;
        el.scrollTop = Math.max(0, Math.min(max, target));
    }

    function toggleQuickReplies() {
        const wrap = document.getElementById('quickReplies');
        const btn = document.getElementById('quickToggle');
        if (!wrap) return;

        const expanding = wrap.classList.contains('collapsed');
        const distFromBottom = messagesDistFromBottomPx();

        if (expanding) {
            wrap.classList.remove('collapsed');
            if (btn) btn.setAttribute('aria-expanded', 'true');
        } else {
            wrap.classList.add('collapsed');
            if (btn) btn.setAttribute('aria-expanded', 'false');
        }

        void wrap.offsetHeight;
        void messagesArea.offsetHeight;
        preserveMessagesScrollFromBottom(distFromBottom);
    }

    function collapseQuickReplies() {
        const wrap = document.getElementById('quickReplies');
        const btn = document.getElementById('quickToggle');
        if (!wrap || wrap.classList.contains('collapsed')) return;
        const distFromBottom = messagesDistFromBottomPx();
        wrap.classList.add('collapsed');
        if (btn) btn.setAttribute('aria-expanded', 'false');
        void wrap.offsetHeight;
        void messagesArea.offsetHeight;
        preserveMessagesScrollFromBottom(distFromBottom);
    }

    function sendQuick(message) {
        collapseQuickReplies();
        inputField.value = message;
        sendMessage();
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function restoreTranscript() {
        try {
            const raw = localStorage.getItem(TRANSCRIPT_KEY);
            if (!raw) return;
            const items = JSON.parse(raw);
            if (!Array.isArray(items) || items.length === 0) return;
            transcript = items;
            hideWelcomeBannerIfNeeded();
            items.forEach((m) => {
                const info = m.intent != null
                    ? { intent: m.intent, confidence: m.confidence != null ? m.confidence : 0 }
                    : null;
                appendMessage(m.role, m.text, info, true);
            });
        } catch (e) {
            console.warn('Could not restore chat transcript', e);
        }
    }

    function resetChat() {
        transcript = [];
        try {
            localStorage.removeItem(TRANSCRIPT_KEY);
            localStorage.removeItem('chatSessionId');
        } catch (e) {
            /* ignore */
        }
        SESSION_ID = null;
        messagesArea.innerHTML = `
            <div class="welcome-banner">
                <div class="welcome-banner-emoji">👋</div>
                <h3>Welcome to Vacations for YOU!</h3>
                <p>Ask about <strong>policies</strong>, <strong>check-in times</strong>, or
                    <strong>cancellations</strong>.<br>Share your <strong>Reservation ID</strong> for booking-specific
                    help.</p>
            </div>`;
        inputField.focus();
    }

    window.addEventListener('load', () => {
        restoreTranscript();
        inputField.focus();
    });
</script>
