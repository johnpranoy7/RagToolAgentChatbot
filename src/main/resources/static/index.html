<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#154e6b">
    <title>Vacations for YOU - Chat Support</title>
    <link rel="icon" type="image/webp" href="images/VFY-ICON-FULL-COLOR-300x300.webp" sizes="300x300">
    <link rel="apple-touch-icon" href="images/VFY-ICON-FULL-COLOR-300x300.webp">
    <link rel="icon" type="image/webp" href="images/VFY-ICON-FULL-COLOR-150x150.webp" sizes="32x32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Roboto body; Poppins header title (client site) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Poppins:wght@500&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page-wrapper">
    <div class="chat-card">

        <div class="chat-header">
            <div class="header-brand">
                <a class="header-brand-link" href="https://vacationsforyou.com/" target="_blank"
                   rel="noopener noreferrer" aria-label="Vacations for YOU — open vacationsforyou.com">
                    <img class="header-logo" src="images/VFY-LOGO-FULL-WHITE-120x80.webp"
                         width="120" height="80" alt="Vacations for YOU" loading="eager" decoding="async">
                </a>
            </div>
            <div class="header-info">
                <div class="header-name">Vacations for YOU</div>
                <div class="header-status">
                    <span class="status-dot"></span>
                    Chat Support · Available 24/7
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-reset" onclick="resetChat()">New Chat</button>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="welcome-banner">
                <div class="welcome-banner-emoji">👋</div>
                <h3>Welcome to Vacations for YOU!</h3>
                <p>Ask about <strong>policies</strong>, <strong>check-in times</strong>, or
                    <strong>cancellations</strong>.<br>Share your <strong>Reservation ID</strong> for booking-specific
                    help.</p>
            </div>
        </div>

        <div class="quick-replies collapsed" id="quickReplies">
            <button type="button" class="quick-toggle" id="quickToggle" onclick="toggleQuickReplies()"
                    aria-expanded="false" aria-controls="quickRepliesPanel"
                    title="Show or hide suggested prompts">
                <span class="quick-toggle-label">Suggested prompts</span>
                <svg class="quick-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
            <div class="quick-replies-panel" id="quickRepliesPanel">
                <div class="quick-replies-panel-inner">
                    <div class="quick-replies-chips">
                        <button type="button" class="quick-btn" onclick="sendQuick('What is your cancellation policy?')">Cancellation Policy</button>
                        <button type="button" class="quick-btn" onclick="sendQuick('What time is check-in?')">Check-in Time</button>
                        <button type="button" class="quick-btn" onclick="sendQuick('Are pets allowed?')">Pet Policy</button>
                        <button type="button" class="quick-btn" onclick="sendQuick('I want to check my reservation')">My Reservation</button>
                        <button type="button" class="quick-btn" onclick="sendQuick('How does payment work?')">Payment Info</button>
                        <button type="button" class="quick-btn" onclick="sendQuick('I want to speak to a human agent')">Talk to Agent</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input
                    class="input-field"
                    id="inputField"
                    type="text"
                    placeholder="Type a message or your Reservation ID…"
                    onkeydown="handleKey(event)"
                    autocomplete="off"
            />
            <button class="send-btn" id="sendBtn" type="button" onclick="sendMessage()" aria-label="Send message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M5 12h14"/>
                    <path d="M12 5l7 7-7 7"/>
                </svg>
            </button>
        </div>

        <div class="chat-footer">
            <a class="footer-brand-link" href="https://vacationsforyou.com/" target="_blank" rel="noopener noreferrer"
               title="Vacations for YOU — cabin &amp; beach rentals">
                <img class="footer-logo" src="images/VFY-LOGO-FULL-COLOR-300x200.webp"
                     width="300" height="200" alt="Vacations for YOU" loading="lazy" decoding="async">
                <span class="footer-brand-text">vacationsforyou.com</span>
            </a>
        </div>

    </div>
</div>
<script>
    const messagesArea = document.getElementById('messagesArea');
    const TRANSCRIPT_KEY = 'vacationsChatTranscript';

    function normalizeSessionId(raw) {
        if (raw == null || raw === '' || String(raw).toLowerCase() === 'unknown') return null;
        const s = String(raw).replace(/unknown/gi, '').trim();
        return s || null;
    }

    let SESSION_ID = normalizeSessionId(localStorage.getItem('chatSessionId'));
    let transcript = [];

    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');

    // CSRF Token (Spring Security)
    const CSRF_TOKEN = document.querySelector('meta[name="_csrf"]')?.content ||
        localStorage.getItem('csrfToken');

    function getTime() {
        return new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    }

    // MARKDOWN RENDERING (Your backend format)
    function renderMarkdown(text) {
        return text
            .replace(/\*\*(.*?)\*\*/g, '<strong style="color:#154e6b;font-weight:600">$1</strong>')
            .replace(/`([^`]+)`/g, '<code style="background:#f0f3f5;padding:2px 6px;border-radius:4px">$1</code>')
            .replace(/\\n/g, '<br>')
            .replace(/\\n\\n/g, '<br><br>');
    }

    function saveTranscript() {
        try {
            localStorage.setItem(TRANSCRIPT_KEY, JSON.stringify(transcript));
        } catch (e) {
            console.warn('Could not save chat transcript', e);
        }
    }

    function hideWelcomeBannerIfNeeded() {
        const w = messagesArea.querySelector('.welcome-banner');
        if (w) w.remove();
    }

    function appendMessage(role, text, intentInfo, skipPersist) {
        hideWelcomeBannerIfNeeded();
        if (!skipPersist) {
            transcript.push({
                role,
                text,
                intent: intentInfo && intentInfo.intent != null ? intentInfo.intent : null,
                confidence: intentInfo && intentInfo.confidence != null ? intentInfo.confidence : null
            });
            saveTranscript();
        }

        const group = document.createElement('div');
        group.className = `msg-group ${role} msg-in`;

        const row = document.createElement('div');
        row.className = 'msg-row';

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = role === 'bot' ? '🤖' : '👦🏻';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.innerHTML = renderMarkdown(text);  // ✅ Markdown → HTML

        row.appendChild(avatar);
        row.appendChild(bubble);
        group.appendChild(row);

        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        const intentLabel = intentInfo && intentInfo.intent != null ? intentInfo.intent : 'general';
        const conf = intentInfo && intentInfo.confidence != null ? intentInfo.confidence : 0;
        meta.innerHTML = `${getTime()}${intentInfo ? `<span class="intent-tag">${intentLabel} · ${Math.round(conf * 100)}%</span>` : ''}`;

        group.appendChild(meta);
        messagesArea.appendChild(group);
        scrollToBottom();
    }

    async function sendMessage() {
        const text = inputField.value.trim();
        if (!text) return;

        inputField.value = '';
        appendMessage('user', text, null);
        setLoading(true);
        showTyping();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': CSRF_TOKEN  // Security
                },
                body: JSON.stringify({
                    message: text,
                    sessionId: SESSION_ID?.replace('unknown', '') || ''
                }),
            });

            // Get new sessionId from header if needed
            SESSION_ID = normalizeSessionId(response.headers.get('X-Session-ID') || SESSION_ID);
            if (SESSION_ID) localStorage.setItem('chatSessionId', SESSION_ID);

            const data = await response.json();
            hideTyping();

            // Map your backend response format
            appendMessage('bot', data.content || data.response, {
                intent: data.source || 'general',
                confidence: data.confidence || 0.0
            });
        } catch (err) {
            hideTyping();
            appendMessage('bot', 'Sorry, something went wrong. Please refresh or call 1-800-VACATION.', null);
        } finally {
            setLoading(false);
            inputField.focus();
        }
    }

    // Rest of your functions unchanged (showTyping, scrollToBottom, etc.)
    function showTyping() {
        const el = document.createElement('div');
        el.className = 'msg-group bot msg-in';
        el.id = 'typingIndicator';

        const row = document.createElement('div');
        row.className = 'typing-indicator';

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = '🤖';

        const bubble = document.createElement('div');
        bubble.className = 'typing-bubble';
        bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

        row.appendChild(avatar);
        row.appendChild(bubble);
        el.appendChild(row);
        messagesArea.appendChild(el);
        scrollToBottom();
    }

    function hideTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function scrollToBottom() {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function setLoading(val) {
        sendBtn.disabled = val;
        inputField.disabled = val;
    }

    /** Pixels from the bottom of the scrollable message list (stable across quick-panel open/close). */
    function messagesDistFromBottomPx() {
        const el = messagesArea;
        return Math.max(0, el.scrollHeight - el.clientHeight - el.scrollTop);
    }

    /** After toggling the quick-replies panel, restore the same distance-from-bottom (requires layout flush first). */
    function preserveMessagesScrollFromBottom(distFromBottom) {
        const el = messagesArea;
        const max = el.scrollHeight - el.clientHeight;
        const target = max - distFromBottom;
        el.scrollTop = Math.max(0, Math.min(max, target));
    }

    function toggleQuickReplies() {
        const wrap = document.getElementById('quickReplies');
        const btn = document.getElementById('quickToggle');
        if (!wrap) return;

        const expanding = wrap.classList.contains('collapsed');
        const distFromBottom = messagesDistFromBottomPx();

        if (expanding) {
            wrap.classList.remove('collapsed');
            if (btn) btn.setAttribute('aria-expanded', 'true');
        } else {
            wrap.classList.add('collapsed');
            if (btn) btn.setAttribute('aria-expanded', 'false');
        }

        void wrap.offsetHeight;
        void messagesArea.offsetHeight;
        preserveMessagesScrollFromBottom(distFromBottom);
    }

    function collapseQuickReplies() {
        const wrap = document.getElementById('quickReplies');
        const btn = document.getElementById('quickToggle');
        if (!wrap || wrap.classList.contains('collapsed')) return;
        const distFromBottom = messagesDistFromBottomPx();
        wrap.classList.add('collapsed');
        if (btn) btn.setAttribute('aria-expanded', 'false');
        void wrap.offsetHeight;
        void messagesArea.offsetHeight;
        preserveMessagesScrollFromBottom(distFromBottom);
    }

    function sendQuick(message) {
        collapseQuickReplies();
        inputField.value = message;
        sendMessage();
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function restoreTranscript() {
        try {
            const raw = localStorage.getItem(TRANSCRIPT_KEY);
            if (!raw) return;
            const items = JSON.parse(raw);
            if (!Array.isArray(items) || items.length === 0) return;
            transcript = items;
            hideWelcomeBannerIfNeeded();
            items.forEach((m) => {
                const info = m.intent != null
                    ? { intent: m.intent, confidence: m.confidence != null ? m.confidence : 0 }
                    : null;
                appendMessage(m.role, m.text, info, true);
            });
        } catch (e) {
            console.warn('Could not restore chat transcript', e);
        }
    }

    function resetChat() {
        transcript = [];
        try {
            localStorage.removeItem(TRANSCRIPT_KEY);
            localStorage.removeItem('chatSessionId');
        } catch (e) {
            /* ignore */
        }
        SESSION_ID = null;
        messagesArea.innerHTML = `
            <div class="welcome-banner">
                <div class="welcome-banner-emoji">👋</div>
                <h3>Welcome to Vacations for YOU!</h3>
                <p>Ask about <strong>policies</strong>, <strong>check-in times</strong>, or
                    <strong>cancellations</strong>.<br>Share your <strong>Reservation ID</strong> for booking-specific
                    help.</p>
            </div>`;
        inputField.focus();
    }

    window.addEventListener('load', () => {
        restoreTranscript();
        inputField.focus();
    });
</script>

</body>
</html>
